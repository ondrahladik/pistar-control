<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"
    >
    {% block extra_head %}{% endblock %}
    <style>
        :root {
            color-scheme: dark;
            --bg-top: #09111e;
            --bg-bottom: #040913;
            --panel: rgba(17, 28, 45, 0.9);
            --panel-soft: rgba(10, 18, 31, 0.82);
            --panel-border: rgba(127, 158, 201, 0.18);
            --text: #edf4ff;
            --muted: #9baed0;
            --accent: #59c5ff;
            --accent-strong: #318fff;
            --success: #47d18c;
            --danger: #ff8d8d;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(49, 143, 255, 0.22), transparent 28%),
                radial-gradient(circle at bottom right, rgba(89, 197, 255, 0.16), transparent 25%),
                linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
        }

        .shell {
            width: min(1160px, calc(100% - 32px));
            margin: 15px auto;
            padding: 28px;
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            background: var(--panel-soft);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .shell.login-shell {
            width: min(100%, calc(100% - 32px));
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            backdrop-filter: none;
            box-shadow: none;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 28px;
            margin-bottom: 34px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(237, 244, 255, 0.92);
            line-height: 1;
        }

        .nav-links {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-links a,
        .nav-links button {
            position: relative;
            padding: 6px 10px;
            border-radius: 999px;
            background: transparent;
            border: 0;
            font: inherit;
            cursor: pointer;
            color: rgba(237, 244, 255, 0.62);
            text-decoration: none;
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            transition: color 0.18s ease, background-color 0.18s ease;
        }

        .nav-links a:hover,
        .nav-links button:hover {
            color: rgba(237, 244, 255, 0.9);
        }

        .nav-links a.is-active {
            color: var(--text);
            background: transparent;
        }

        .nav-links a.is-active:hover {
            background: transparent;
        }

        .nav-links a.is-active::after {
            content: "";
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: 2px;
            height: 1px;
            border-radius: 999px;
            background: rgba(89, 197, 255, 0.85);
        }

        .nav-links form {
            margin: 0;
        }

        .nav-links button {
            padding-inline: 8px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(89, 197, 255, 0.14);
            color: var(--accent);
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .panel {
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            background: var(--panel);
            padding: 26px;
        }

        h1 {
            margin: 18px 0 12px;
            font-size: clamp(2.2rem, 4vw, 4rem);
            line-height: 1;
        }

        h2 {
            margin: 0 0 12px;
            font-size: 1.4rem;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 18px;
            border-radius: 16px;
            font-weight: 600;
            border: 0;
            cursor: pointer;
            text-decoration: none;
            font: inherit;
        }

        .button.primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
            color: #04111d;
        }

        .button.secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }

        .button.danger {
            background: rgba(255, 122, 122, 0.14);
            color: var(--danger);
        }

        .status {
            min-height: 24px;
            color: var(--muted);
        }

        .status.success {
            color: var(--success);
        }

        .status.error {
            color: var(--danger);
        }

        code,
        pre {
            font-family: Consolas, "Courier New", monospace;
        }

        pre {
            margin: 14px 0 0;
            padding: 14px 16px;
            overflow: auto;
            border-radius: 16px;
            background: #0b1525;
            color: #d7e8ff;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 900px) {
            .shell {
                width: min(100%, calc(100% - 20px));
                padding: 20px;
            }

            .nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
                margin-bottom: 28px;
            }
        }
    </style>
</head>
<body>
    <main class="shell{% if active_page == 'login' %} login-shell{% endif %}">
        {% if active_page != "login" %}
        <nav class="nav">
            <div class="brand">
                    <span>Pi-Star Control</span>
                </div>
            <div class="nav-links">
                <a href="/" class="{% if active_page == 'home' %}is-active{% endif %}">Domů</a>
                <a href="/config" class="{% if active_page == 'config' %}is-active{% endif %}">Konfigurace</a>
                <a href="#" id="piStarLink" target="_blank" title="Otevřít Pi-Star" rel="noopener noreferrer">Pi-Star</a>
                <form method="post" action="/auth/logout">
                    <button type="submit" title="Odhlásit se"><i class="bi bi-door-open"></i></button>
                </form>
            </div>
        </nav>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    {% if active_page != "login" %}
    <script>
        const piStarLink = document.getElementById("piStarLink");
        if (piStarLink) {
            piStarLink.href = `${window.location.protocol}//${window.location.hostname}`;
        }
    </script>
    {% endif %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
