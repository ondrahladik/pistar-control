{% extends "base.html" %}

{% block content %}
<style>
    .dashboard-shell {
        display: grid;
        gap: 22px;
    }

    .dashboard-header {
        display: grid;
    }

    .dashboard-card {
        position: relative;
        overflow: hidden;
    }

    .dashboard-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
            radial-gradient(circle at top right, rgba(89, 197, 255, 0.12), transparent 36%),
            linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
        pointer-events: none;
    }

    .dashboard-card > * {
        position: relative;
        z-index: 1;
    }

    .dashboard-label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(89, 197, 255, 0.14);
        color: var(--accent);
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .dashboard-title {
        margin: 18px 0 8px;
        font-size: clamp(1.8rem, 4vw, 3rem);
        line-height: 1;
    }

    .live-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
    }

    .live-row {
        display: grid;
        gap: 6px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.05);
        text-align: center;
        align-items: center;
        justify-items: center;
    }

    .live-row strong {
        font-size: 0.82rem;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .live-row span {
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        color: var(--text);
        line-height: 1.15;
    }

    .recent-calls {
        display: grid;
        gap: 12px;
        margin-top: 18px;
    }

    .recent-calls-table-wrap {
        overflow-x: auto;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(255, 255, 255, 0.04);
    }

    .recent-calls-table {
        width: 100%;
        border-collapse: collapse;
    }

    .recent-calls-table thead th {
        padding: 10px 14px;
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(255, 255, 255, 0.03);
    }

    .recent-calls-table tbody td {
        padding: 10px 14px;
        color: var(--text);
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        line-height: 1.2;
    }

    .recent-calls-table tbody tr:last-child td {
        border-bottom: 0;
    }

    .recent-calls-table tbody td:nth-child(1) {
        width: 16%;
        color: var(--muted);
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
    }

    .recent-calls-table tbody td:nth-child(2) {
        width: 24%;
        font-weight: 600;
        overflow-wrap: anywhere;
    }

    .recent-calls-table tbody td:nth-child(3) {
        width: 15%;
        color: var(--accent);
        white-space: nowrap;
    }

    .recent-calls-table tbody td:nth-child(4),
    .recent-calls-table tbody td:nth-child(5),
    .recent-calls-table tbody td:nth-child(6) {
        width: 15%;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
    }

    .recent-calls-empty {
        padding: 14px;
        color: var(--muted);
        text-align: center;
    }

    .status-box {
        display: grid;
        gap: 8px;
        height: 100%;
        padding: 22px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .status-box strong {
        font-size: 0.95rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .status-box span {
        font-size: clamp(1.5rem, 3vw, 2.2rem);
        color: var(--text);
        line-height: 1.1;
    }

    .status-box small {
        color: var(--muted);
        font-size: 0.95rem;
    }

    .control-panel {
        display: grid;
        gap: 18px;
    }

    .panel-heading {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
    }

    .section-title {
        font-size: 0.95rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .network-buttons {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
    }

    .config-summary {
        display: grid;
        gap: 18px;
    }

    .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
    }

    .summary-row {
        display: grid;
        gap: 6px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.05);
        text-align: center;
        align-items: center;
        justify-items: center;
    }

    .summary-row strong {
        font-size: 0.82rem;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .summary-row span {
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        color: var(--text);
        line-height: 1.15;
    }

    .network-buttons button {
        width: 100%;
        padding: 16px 18px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    .network-buttons button:hover {
        transform: translateY(-1px);
    }

    .network-buttons button.is-active {
        border-color: rgba(89, 197, 255, 0.34);
        background: linear-gradient(135deg, rgba(89, 197, 255, 0.18) 0%, rgba(49, 143, 255, 0.18) 100%);
        color: var(--accent);
    }

    .network-buttons button small {
        display: block;
        margin-top: 6px;
        color: inherit;
        opacity: 0.72;
        font-size: 0.82rem;
        font-weight: 500;
    }

    .network-buttons button:disabled {
        cursor: not-allowed;
        opacity: 0.72;
        transform: none;
    }

    @media (max-width: 900px) {
        .live-grid {
            grid-template-columns: 1fr;
        }

        .summary-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<section class="dashboard-shell">
    <section class="panel control-panel">
        <div class="panel-heading">
            <strong class="section-title">Konfigurace</strong>
            <small id="statusMessage">Načítám dostupné konfigurace...</small>
        </div>
        <div class="network-buttons" id="networkButtons">
            <button type="button" disabled>Načítám...</button>
        </div>
    </section>

    <!-- "Moje nastavení" removed; Callsign and DMR ID are now shown in the header -->

    <div class="dashboard-header">
        <article class="panel dashboard-card">
            <strong class="section-title">Dashboard</strong>
            <div class="live-grid">
                <div class="live-row">
                    <strong>Volačka</strong>
                    <span id="activeCallsign">---</span>
                </div>
                <div class="live-row">
                    <strong>Talkgroup</strong>
                    <span id="activeTalkgroup">---</span>
                </div>
            </div>
            <div class="recent-calls">
                <div class="panel-heading">
                    <strong class="section-title">Posledních 10 volajících</strong>
                </div>
                <div class="recent-calls-table-wrap">
                    <table class="recent-calls-table">
                        <thead>
                            <tr>
                                <th scope="col">Čas</th>
                                <th scope="col">Volačka</th>
                                <th scope="col">TG</th>
                                <th scope="col">DUR</th>
                                <th scope="col">LOSS</th>
                                <th scope="col">BER</th>
                            </tr>
                        </thead>
                        <tbody id="recentCallsList">
                            <tr>
                                <td class="recent-calls-empty" colspan="6">Načítám poslední volání...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </article>
    </div>
</section>

<script>
    const networkButtons = document.getElementById("networkButtons");
    const statusMessage = document.getElementById("statusMessage");
    const activeCallsign = document.getElementById("activeCallsign");
    const activeTalkgroup = document.getElementById("activeTalkgroup");
    const recentCallsList = document.getElementById("recentCallsList");
    const configCallsign = document.getElementById("configCallsign");
    const configId = document.getElementById("configId");
    let statusEventSource = null;
    let fallbackRefreshTimer = null;
    const STATUS_REFRESH_INTERVAL_MS = 1000;

    function setStatus(message, kind = "") {
        statusMessage.textContent = message;
        statusMessage.className = kind ? `status ${kind}` : "status";
    }

    async function apiRequest(url, options = {}) {
        const response = await fetch(url, options);
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
            throw new Error(payload.error || "Požadavek se nepodařilo dokončit.");
        }

        return payload;
    }

    function getNetworkDisplayId(networkId) {
        if (networkId === "host1") {
            return "Host 1";
        }
        if (networkId === "host2") {
            return "Host 2";
        }
        return networkId || "---";
    }

    function renderNetworkButtons(networks, activeNetwork) {
        networkButtons.innerHTML = "";

        if (networks.length === 0) {
            const button = document.createElement("button");
            button.type = "button";
            button.disabled = true;
            button.textContent = "Žádná konfigurace není dostupná";
            networkButtons.appendChild(button);
            return;
        }

        networks.forEach((network) => {
            const button = document.createElement("button");
            button.type = "button";
            const displayId = getNetworkDisplayId(network.id);
            button.dataset.networkId = network.id;
            button.innerHTML = `${network.label}<small>${displayId}</small>`;
            if (network.id === activeNetwork) {
                button.classList.add("is-active");
            }
            button.addEventListener("click", () => switchNetwork(network));
            networkButtons.appendChild(button);
        });
    }

    function renderRealtimeStatus(statusPayload) {
        const activeCall = statusPayload.active_call;

        if (activeCall && typeof activeCall === "object") {
            activeCallsign.textContent = activeCall.callsign || "?";
            activeTalkgroup.textContent = activeCall.talkgroup || "?";
            return;
        }

        activeCallsign.textContent = "---";
        activeTalkgroup.textContent = "---";
    }

    function renderRecentCalls(recentCalls) {
        recentCallsList.innerHTML = "";

        if (!Array.isArray(recentCalls) || recentCalls.length === 0) {
            const emptyRow = document.createElement("tr");
            emptyRow.innerHTML = '<td class="recent-calls-empty" colspan="6">Zatím tu nejsou žádná dokončená volání.</td>';
            recentCallsList.appendChild(emptyRow);
            return;
        }

        recentCalls.forEach((recentCall) => {
            const row = document.createElement("tr");
            const talkgroup = recentCall.talkgroup || "---";
            const duration = recentCall.duration ? `${recentCall.duration}s` : "---";
            const loss = recentCall.loss ? `${recentCall.loss}%` : "---";
            const ber = recentCall.ber ? `${recentCall.ber}%` : "---";
            row.innerHTML = `
                <td>${recentCall.time || "---"}</td>
                <td>${recentCall.callsign || "---"}</td>
                <td>${talkgroup}</td>
                <td>${duration}</td>
                <td>${loss}</td>
                <td>${ber}</td>
            `;
            recentCallsList.appendChild(row);
        });
    }

    function renderCurrentConfigSettings(statusPayload) {
        const settings = statusPayload.current_network_settings || {};
        configCallsign.textContent = settings.callsign || "---";
        configId.textContent = settings.id || "---";
    }

    function updateActiveNetworkButton(activeNetwork) {
        networkButtons.querySelectorAll("button").forEach((button) => {
            button.classList.toggle("is-active", button.dataset.networkId === activeNetwork);
        });
    }

    function applyStatusPayload(statusPayload) {
        renderRealtimeStatus(statusPayload);
        renderRecentCalls(statusPayload.recent_calls || []);
        renderCurrentConfigSettings(statusPayload);
        updateActiveNetworkButton(statusPayload.current_network);
    }

    async function loadHomeData() {
        setStatus("Načítám stav a dostupné konfigurace...");

        try {
            const [statusPayload, networksPayload] = await Promise.all([
                apiRequest("/api/status"),
                apiRequest("/api/networks")
            ]);

            renderNetworkButtons(networksPayload.networks || [], statusPayload.current_network);
            applyStatusPayload(statusPayload);
            startStatusStream();
            setStatus("Připraveno", "success");
        } catch (error) {
            if (error.message === "Unauthorized") {
                window.location.href = "/login";
                return;
            }
            setStatus(error.message, "error");
        }
    }

    async function refreshStatusFallback() {
        try {
            const statusPayload = await apiRequest("/api/status");
            applyStatusPayload(statusPayload);
            const networksPayload = await apiRequest("/api/networks");
            renderNetworkButtons(networksPayload.networks || [], statusPayload.current_network);
        } catch (error) {
            if (error.message === "Unauthorized") {
                window.location.href = "/login";
            }
        }
    }

    function ensureFallbackPolling() {
        if (fallbackRefreshTimer) {
            return;
        }
        fallbackRefreshTimer = window.setInterval(refreshStatusFallback, STATUS_REFRESH_INTERVAL_MS);
    }

    function startStatusStream() {
        ensureFallbackPolling();

        if (typeof EventSource === "undefined") {
            return;
        }

        if (statusEventSource) {
            statusEventSource.close();
        }

        statusEventSource = new EventSource("/api/status/stream");
        statusEventSource.addEventListener("status", (event) => {
            const statusPayload = JSON.parse(event.data);
            applyStatusPayload(statusPayload);
            refreshNetworks(statusPayload.current_network);
        });
        statusEventSource.onerror = () => {
            statusEventSource?.close();
            ensureFallbackPolling();
            window.setTimeout(startStatusStream, 1000);
        };
    }

    async function refreshNetworks(activeNetwork) {
        try {
            const networksPayload = await apiRequest("/api/networks");
            renderNetworkButtons(networksPayload.networks || [], activeNetwork);
        } catch (error) {
            if (error.message === "Unauthorized") {
                window.location.href = "/login";
            }
        }
    }

    async function switchNetwork(network) {
        setStatus(`Přepínám konfiguraci na ${network.label}...`);

        try {
            await apiRequest("/api/network", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ network: network.id })
            });

            await loadHomeData();
            setStatus(`Aktivní je ${network.label}`, "success");
        } catch (error) {
            if (error.message === "Unauthorized") {
                window.location.href = "/login";
                return;
            }
            setStatus(error.message, "error");
        }
    }

    loadHomeData();
</script>
{% endblock %}
