{% extends "base.html" %}

{% block extra_head %}
<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
>
{% endblock %}

{% block content %}
<style>
    .config-shell {
        display: grid;
        gap: 24px;
    }

    .config-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
    }

    .config-title {
        margin-bottom: 10px;
        font-size: clamp(1.9rem, 3.4vw, 3.1rem);
    }

    .config-card {
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 24px;
        background: rgba(11, 19, 33, 0.92);
    }

    .config-card .card-body {
        padding: 24px;
    }

    .config-card .card-title {
        color: var(--text);
    }

    .config-card .card-subtitle,
    .form-label,
    .form-text,
    .form-check-label {
        color: var(--muted) !important;
    }

    .form-control,
    .form-select {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
    }

    .form-control:focus,
    .form-select:focus {
        border-color: rgba(89, 197, 255, 0.4);
        box-shadow: 0 0 0 0.25rem rgba(89, 197, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
    }

    .form-control::placeholder {
        color: rgba(155, 174, 208, 0.7);
    }

    textarea.form-control {
        min-height: 170px;
        font: 13px/1.55 Consolas, "Courier New", monospace;
    }

    .host-item {
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.03);
        overflow: hidden;
    }

    .host-item summary {
        list-style: none;
        cursor: pointer;
        padding: 18px 20px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--text);
        font-weight: 600;
    }

    .host-item summary::-webkit-details-marker {
        display: none;
    }

    .host-item summary span {
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 500;
    }

    .host-body {
        display: grid;
        gap: 14px;
        padding: 0 20px 20px;
    }

    .host-actions {
        display: flex;
        justify-content: flex-end;
    }

    .field-pair {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
    }

    @media (max-width: 700px) {
        .field-pair {
            grid-template-columns: 1fr;
        }
    }
</style>

<section class="config-shell">
    <section class="panel">
        <span class="eyebrow">Config</span>
        <h1 class="config-title">Konfigurace serveru</h1>
        <div id="status" class="status mt-3">Načítám konfiguraci...</div>
    </section>

    <section id="configGrid" class="config-grid"></section>

    <section class="panel">
        <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center">
            <div>
                <h2 class="mb-1">Správa host konfigurací</h2>
                <p>Upravte obsah jednotlivých host souborů a uložte je bez zásahu do ostatních sekcí.</p>
            </div>
            <button id="bottomSaveButton" class="button primary" type="button" disabled>Uložit konfiguraci</button>
        </div>
        <div id="hostsList" class="mt-4 d-grid gap-3">
            <div class="status">Načítám hosty...</div>
        </div>
    </section>
</section>

<script>
    const bottomSaveButton = document.getElementById("bottomSaveButton");
    const statusNode = document.getElementById("status");
    const configGrid = document.getElementById("configGrid");
    const hostsList = document.getElementById("hostsList");
    const TEXTAREA_FIELDS = new Set([]);

    const CHECKBOX_FIELDS = new Set([
        "telegram.enabled"
    ]);

    const PASSWORD_FIELDS = new Set([
        "telegram.bot_token",
        "api.token"
    ]);

    const PAIRED_FIELDS = [
        ["telegram.chat_id", "telegram.thread_id"]
    ];

    let currentConfig = {};

    function setStatus(message, kind = "") {
        statusNode.textContent = message;
        statusNode.className = kind ? `status mt-3 ${kind}` : "status mt-3";
    }

    function setLoading(isLoading) {
        bottomSaveButton.disabled = isLoading || Object.keys(currentConfig).length === 0;
    }

    function prettifySectionName(sectionName) {
        if (sectionName === "telegram") {
            return "Telegram";
        }
        if (sectionName === "aliases") {
            return "Aliasy sítí";
        }
        if (sectionName === "api") {
            return "API";
        }
        return sectionName;
    }

    function prettifyFieldName(sectionName, key) {
        const names = {
            "telegram.enabled": "Telegram zapnutý",
            "telegram.bot_token": "Telegram Bot Token",
            "telegram.chat_id": "Chat ID",
            "telegram.thread_id": "Thread ID",
            "api.port": "Port",
            "api.token": "API token"
        };
        return names[`${sectionName}.${key}`] || key;
    }

    function createField(sectionName, key, value) {
        const fieldId = `${sectionName}.${key}`;
        const wrapper = document.createElement("div");
        wrapper.className = CHECKBOX_FIELDS.has(fieldId) ? "form-check form-switch" : "mb-3";

        const label = document.createElement("label");
        label.className = CHECKBOX_FIELDS.has(fieldId) ? "form-check-label" : "form-label";
        label.htmlFor = fieldId;
        label.textContent = prettifyFieldName(sectionName, key);

        let input;
        if (TEXTAREA_FIELDS.has(fieldId)) {
            input = document.createElement("textarea");
            input.className = "form-control";
            input.rows = 7;
            input.value = value;
        } else {
            input = document.createElement("input");
            input.className = CHECKBOX_FIELDS.has(fieldId) ? "form-check-input" : "form-control";

            if (CHECKBOX_FIELDS.has(fieldId)) {
                input.type = "checkbox";
                input.checked = String(value).toLowerCase() === "true";
            } else {
                input.type = PASSWORD_FIELDS.has(fieldId) ? "password" : "text";
                input.value = value;
            }
        }

        input.id = fieldId;
        input.dataset.section = sectionName;
        input.dataset.key = key;

        if (CHECKBOX_FIELDS.has(fieldId)) {
            wrapper.append(input, label);
        } else {
            wrapper.append(label, input);
        }

        return wrapper;
    }

    function renderConfig(config) {
        currentConfig = config;
        configGrid.innerHTML = "";

        const sections = Object.entries(config);
        let totalFields = 0;

        sections.forEach(([sectionName, values]) => {
            const article = document.createElement("article");
            article.className = "card config-card";

            const body = document.createElement("div");
            body.className = "card-body";

            const title = document.createElement("h2");
            title.className = "card-title h4";
            title.textContent = prettifySectionName(sectionName);

            body.append(title);

            const pairedFieldIds = new Set(PAIRED_FIELDS.flat());
            const renderedPairs = new Set();

            Object.entries(values).forEach(([key, value]) => {
                totalFields += 1;
                const fieldId = `${sectionName}.${key}`;
                const pair = PAIRED_FIELDS.find((items) => items.includes(fieldId));

                if (pair) {
                    const pairKey = pair.join("|");
                    if (renderedPairs.has(pairKey)) {
                        return;
                    }
                    renderedPairs.add(pairKey);

                    const pairWrapper = document.createElement("div");
                    pairWrapper.className = "field-pair";

                    pair.forEach((pairedFieldId) => {
                        const [pairedSection, pairedKey] = pairedFieldId.split(".");
                        const pairedValue = config[pairedSection]?.[pairedKey] || "";
                        pairWrapper.appendChild(createField(pairedSection, pairedKey, pairedValue));
                    });

                    body.appendChild(pairWrapper);
                    return;
                }

                if (!pairedFieldIds.has(fieldId)) {
                    body.appendChild(createField(sectionName, key, value));
                }
            });

            article.appendChild(body);
            configGrid.appendChild(article);
        });

        bottomSaveButton.disabled = sections.length === 0;
    }

    function collectConfig() {
        const nextConfig = {};

        document.querySelectorAll("[data-section][data-key]").forEach((input) => {
            const section = input.dataset.section;
            const key = input.dataset.key;
            const fieldId = `${section}.${key}`;

            if (!nextConfig[section]) {
                nextConfig[section] = {};
            }

            nextConfig[section][key] = CHECKBOX_FIELDS.has(fieldId)
                ? String(input.checked)
                : input.value;
        });

        return nextConfig;
    }

    async function apiRequest(url, options = {}) {
        const response = await fetch(url, options);
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
            throw new Error(payload.error || "Požadavek se nepodařilo dokončit.");
        }

        return payload;
    }

    async function loadHost(name) {
        const payload = await apiRequest(`/api/hosts/${name}`);
        return payload.host;
    }

    async function saveHost(name, content) {
        const payload = await apiRequest(`/api/hosts/${name}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ content })
        });
        return payload.host;
    }

    function renderHosts(hosts) {
        hostsList.innerHTML = "";

        if (hosts.length === 0) {
            hostsList.innerHTML = '<div class="status">Žádné host konfigurace nejsou dostupné.</div>';
            return;
        }

        hosts.forEach((host) => {
            const item = document.createElement("details");
            item.className = "host-item";

            const summary = document.createElement("summary");
            summary.innerHTML = `${host.label} <span>${host.id}</span>`;

            const body = document.createElement("div");
            body.className = "host-body";

            const textarea = document.createElement("textarea");
            textarea.className = "form-control";
            textarea.value = host.content;
            textarea.dataset.host = host.id;

            const hostStatus = document.createElement("div");
            hostStatus.className = "status";
            hostStatus.textContent = "Připraveno k úpravě.";

            const actions = document.createElement("div");
            actions.className = "host-actions";

            const saveButton = document.createElement("button");
            saveButton.type = "button";
            saveButton.className = "button secondary";
            saveButton.textContent = "Uložit host";
            saveButton.addEventListener("click", async () => {
                saveButton.disabled = true;
                hostStatus.textContent = "Ukládám host konfiguraci...";
                hostStatus.className = "status";

                try {
                    const savedHost = await saveHost(host.id, textarea.value);
                    textarea.value = savedHost.content;
                    hostStatus.textContent = "Host konfigurace byla uložena.";
                    hostStatus.className = "status success";
                } catch (error) {
                    if (error.message === "Unauthorized") {
                        window.location.href = "/login";
                        return;
                    }
                    hostStatus.textContent = error.message;
                    hostStatus.className = "status error";
                } finally {
                    saveButton.disabled = false;
                }
            });

            actions.appendChild(saveButton);
            body.append(textarea, hostStatus, actions);
            item.append(summary, body);
            hostsList.appendChild(item);
        });
    }

    async function loadHosts() {
        hostsList.innerHTML = '<div class="status">Načítám hosty...</div>';

        try {
            const networksPayload = await apiRequest("/api/networks");
            const hostIds = (networksPayload.networks || []).map((network) => network.id);
            const hosts = await Promise.all(hostIds.map((hostId) => loadHost(hostId)));
            renderHosts(hosts);
        } catch (error) {
            if (error.message === "Unauthorized") {
                window.location.href = "/login";
                return;
            }
            hostsList.innerHTML = `<div class="status error">${error.message}</div>`;
        }
    }

    async function loadConfig() {
        setLoading(true);
        setStatus("Načítám konfiguraci...");

        try {
            const payload = await apiRequest("/api/config");
            renderConfig(payload.config || {});
            setStatus("Konfigurace byla úspěšně načtena.", "success");
        } catch (error) {
            if (error.message === "Unauthorized") {
                window.location.href = "/login";
                return;
            }
            setStatus(error.message, "error");
        } finally {
            setLoading(false);
        }
    }

    async function saveConfig() {
        const config = collectConfig();
        setLoading(true);
        setStatus("Ukládám změny do app.ini...");

        try {
            const payload = await apiRequest("/api/config", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ config })
            });

            renderConfig(payload.config || {});
            await loadHosts();
            setStatus("Konfigurace byla uložena.", "success");
        } catch (error) {
            if (error.message === "Unauthorized") {
                window.location.href = "/login";
                return;
            }
            setStatus(error.message, "error");
        } finally {
            setLoading(false);
        }
    }

    bottomSaveButton.addEventListener("click", saveConfig);

    loadConfig();
    loadHosts();
</script>
{% endblock %}
