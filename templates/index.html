{% extends "base.html" %}

{% block content %}
<style>
    .config-shell {
        display: grid;
        gap: 24px;
    }

    .config-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
    }

    .config-title {
        margin: 0;
        font-size: clamp(1.7rem, 3vw, 2.7rem);
    }

    .config-intro-header {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 16px;
    }

    .config-intro-heading {
        flex: 1;
    }

    .config-card {
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 24px;
        background: rgba(11, 19, 33, 0.92);
        height: 100%;
    }

    .config-card-stack {
        display: grid;
        gap: 20px;
        height: 100%;
    }

    .config-card .card-body {
        padding: 24px;
    }

    .config-card .card-title {
        color: var(--text);
    }

    .config-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
    }

    .config-card-header .card-title {
        margin: 0;
    }

    .section-switch {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 42px;
    }

    .section-switch .form-check-input {
        margin: 0;
        float: none;
        cursor: pointer;
    }

    .config-card .card-subtitle,
    .form-label,
    .form-text,
    .form-check-label {
        color: var(--muted) !important;
    }

    .form-control,
    .form-select {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
    }

    .form-select {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        background:
            linear-gradient(45deg, transparent 50%, rgba(155, 174, 208, 0.85) 50%),
            linear-gradient(135deg, rgba(155, 174, 208, 0.85) 50%, transparent 50%),
            rgba(255, 255, 255, 0.05);
        background-position:
            calc(100% - 22px) calc(50% - 3px),
            calc(100% - 16px) calc(50% - 3px),
            0 0;
        background-size:
            6px 6px,
            6px 6px,
            100% 100%;
        background-repeat: no-repeat;
    }

    .form-control:focus,
    .form-select:focus {
        border-color: rgba(89, 197, 255, 0.4);
        box-shadow: 0 0 0 0.25rem rgba(89, 197, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
    }

    .form-select {
        padding-right: 44px;
    }

    .form-select option {
        background: #0f1726;
        color: var(--text);
    }

    .form-control::placeholder {
        color: rgba(155, 174, 208, 0.7);
    }

    textarea.form-control {
        min-height: 170px;
        font: 13px/1.55 Consolas, "Courier New", monospace;
    }

    .host-item {
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.03);
        overflow: hidden;
    }

    .host-item summary {
        list-style: none;
        cursor: pointer;
        padding: 18px 20px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--text);
        font-weight: 600;
    }

    .host-item summary::-webkit-details-marker {
        display: none;
    }

    .host-item summary span {
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 500;
    }

    .host-body {
        display: grid;
        gap: 14px;
        padding: 0 20px 20px;
    }

    .host-actions {
        display: flex;
        justify-content: flex-end;
    }

    .field-pair {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
    }

    @media (max-width: 700px) {
        .field-pair {
            grid-template-columns: 1fr;
        }

        .config-grid {
            grid-template-columns: 1fr;
        }

        .config-card-stack {
            height: auto;
        }

        .config-intro-header {
            justify-content: center;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
        }

        .config-intro-actions {
            justify-content: center;
        }

        #status {
            text-align: center;
        }
    }
</style>

<section class="config-shell">
    <section class="panel">
        <div class="config-intro-header">
            <div class="config-intro-heading">
                <h1 class="config-title">Konfigurace serveru</h1>
            </div>
            <div class="config-intro-actions">
                <a class="button secondary" href="https://github.com/ondrahladik/pistar-control/tree/main/docs"
                    target="_blank" rel="noopener noreferrer">
                    Dokumentace
                </a>
                <button id="bottomSaveButton" class="button primary" type="button" disabled>Uložit</button>
            </div>
        </div>
        <div id="status" class="status mt-3">Načítám konfiguraci...</div>
    </section>

    <section id="configGrid" class="config-grid"></section>

    <section class="panel">
        <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center">
            <div>
                <h2 class="mb-1">Správa host konfigurací</h2>
                <p>Upravte obsah jednotlivých host souborů a uložte je bez zásahu do ostatních sekcí.</p>
            </div>
        </div>
        <div id="hostsList" class="mt-4 d-grid gap-3">
            <div class="status">Načítám hosty...</div>
        </div>
    </section>
</section>

<script>
    const bottomSaveButton = document.getElementById("bottomSaveButton");
    const statusNode = document.getElementById("status");
    const configGrid = document.getElementById("configGrid");
    const hostsList = document.getElementById("hostsList");
    const TEXTAREA_FIELDS = new Set([]);
    const SELECT_FIELDS = new Set([
        "general.timezone"
    ]);

    const CHECKBOX_FIELDS = new Set([
        "telegram.enabled",
        "mqtt.enabled"
    ]);

    const PASSWORD_FIELDS = new Set([
        "telegram.bot_token",
        "api.token",
        "mqtt.password"
    ]);

    const PAIRED_FIELDS = [
        ["telegram.chat_id", "telegram.thread_id"],
        ["mqtt.username", "mqtt.password"],
        ["mqtt.server", "mqtt.port"],
        ["mqtt.topic_pub", "mqtt.topic_sub"]
    ];

    const SECTION_TOGGLE_FIELDS = {
        telegram: "enabled",
        mqtt: "enabled"
    };

    let currentConfig = {};
    let timezoneOptions = [];

    function setStatus(message, kind = "") {
        statusNode.textContent = message;
        statusNode.className = kind ? `status mt-3 ${kind}` : "status mt-3";
    }

    function setLoading(isLoading) {
        bottomSaveButton.disabled = isLoading || Object.keys(currentConfig).length === 0;
    }

    function prettifySectionName(sectionName) {
        if (sectionName === "telegram") {
            return "Telegram";
        }
        if (sectionName === "aliases") {
            return "Aliasy sítí";
        }
        if (sectionName === "api") {
            return "API";
        }
        if (sectionName === "mqtt") {
            return "MQTT";
        }
        return sectionName;
    }

    function prettifyFieldName(sectionName, key) {
        const names = {
            "telegram.enabled": "Telegram zapnutý",
            "telegram.bot_token": "Bot Token",
            "telegram.chat_id": "Chat ID",
            "telegram.thread_id": "Thread ID",
            "api.port": "Port",
            "api.token": "API token",
            "general.timezone": "Časové pásmo",
            "aliases.host1": "Host 1",
            "aliases.host2": "Host 2",
            "mqtt.server": "Server",
            "mqtt.port": "Port",
            "mqtt.username": "Jméno",
            "mqtt.password": "Heslo",
            "mqtt.enabled": "MQTT zapnuté",
            "mqtt.topic_pub": "Topic (Pub)",
            "mqtt.topic_sub": "Topic (Sub)"
        };
        return names[`${sectionName}.${key}`] || key;
    }

    function getOrderedSections(config) {
        const preferredOrder = ["aliases", "api", "mqtt", "telegram", "general"];
        const configEntries = Object.entries(config);
        const mappedEntries = new Map(configEntries);
        const ordered = [];

        preferredOrder.forEach((sectionName) => {
            if (mappedEntries.has(sectionName)) {
                ordered.push([sectionName, mappedEntries.get(sectionName)]);
                mappedEntries.delete(sectionName);
            }
        });

        mappedEntries.forEach((values, sectionName) => {
            ordered.push([sectionName, values]);
        });

        return ordered;
    }

    function createField(sectionName, key, value) {
        const fieldId = `${sectionName}.${key}`;
        const wrapper = document.createElement("div");
        wrapper.className = CHECKBOX_FIELDS.has(fieldId) ? "form-check form-switch" : "mb-3";

        const label = document.createElement("label");
        label.className = CHECKBOX_FIELDS.has(fieldId) ? "form-check-label" : "form-label";
        label.htmlFor = fieldId;
        label.textContent = prettifyFieldName(sectionName, key);

        let input;
        if (TEXTAREA_FIELDS.has(fieldId)) {
            input = document.createElement("textarea");
            input.className = "form-control";
            input.rows = 7;
            input.value = value;
        } else if (SELECT_FIELDS.has(fieldId)) {
            input = document.createElement("select");
            input.className = "form-select";

            timezoneOptions.forEach((timezoneName) => {
                const option = document.createElement("option");
                option.value = timezoneName;
                option.textContent = timezoneName === "system" ? "system (systémové pásmo)" : timezoneName;
                option.selected = timezoneName === value;
                input.appendChild(option);
            });
        } else {
            input = document.createElement("input");
            input.className = CHECKBOX_FIELDS.has(fieldId) ? "form-check-input" : "form-control";

            if (CHECKBOX_FIELDS.has(fieldId)) {
                input.type = "checkbox";
                input.checked = String(value).toLowerCase() === "true";
            } else {
                input.type = PASSWORD_FIELDS.has(fieldId) ? "password" : "text";
                input.value = value;
            }
        }

        input.id = fieldId;
        input.dataset.section = sectionName;
        input.dataset.key = key;

        if (CHECKBOX_FIELDS.has(fieldId)) {
            wrapper.append(input, label);
        } else {
            wrapper.append(label, input);
        }

        return wrapper;
    }

    function createSectionToggle(sectionName, value) {
        const key = SECTION_TOGGLE_FIELDS[sectionName];
        const fieldId = `${sectionName}.${key}`;
        const wrapper = document.createElement("div");
        wrapper.className = "section-switch";

        const input = document.createElement("input");
        input.type = "checkbox";
        input.className = "form-check-input";
        input.id = fieldId;
        input.checked = String(value).toLowerCase() === "true";
        input.dataset.section = sectionName;
        input.dataset.key = key;
        input.setAttribute("role", "switch");
        input.setAttribute("aria-label", prettifyFieldName(sectionName, key));

        wrapper.appendChild(input);
        return wrapper;
    }

    function createSectionCard(sectionName, values, config) {
        const article = document.createElement("article");
        article.className = "card config-card";

        const body = document.createElement("div");
        body.className = "card-body";

        if (sectionName !== "general") {
            const header = document.createElement("div");
            header.className = "config-card-header";

            const title = document.createElement("h2");
            title.className = "card-title h4";
            title.textContent = prettifySectionName(sectionName);

            header.appendChild(title);

            if (SECTION_TOGGLE_FIELDS[sectionName]) {
                header.appendChild(createSectionToggle(sectionName, values[SECTION_TOGGLE_FIELDS[sectionName]] || "false"));
            }

            body.appendChild(header);
        }

        const pairedFieldIds = new Set(PAIRED_FIELDS.flat());
        const renderedPairs = new Set();
        const toggleKey = SECTION_TOGGLE_FIELDS[sectionName];

        Object.entries(values).forEach(([key, value]) => {
            const fieldId = `${sectionName}.${key}`;
            const pair = PAIRED_FIELDS.find((items) => items.includes(fieldId));

            if (toggleKey && key === toggleKey) {
                return;
            }

            if (pair) {
                const pairKey = pair.join("|");
                if (renderedPairs.has(pairKey)) {
                    return;
                }
                renderedPairs.add(pairKey);

                const pairWrapper = document.createElement("div");
                pairWrapper.className = "field-pair";

                pair.forEach((pairedFieldId) => {
                    const [pairedSection, pairedKey] = pairedFieldId.split(".");
                    const pairedValue = config[pairedSection]?.[pairedKey] || "";
                    pairWrapper.appendChild(createField(pairedSection, pairedKey, pairedValue));
                });

                body.appendChild(pairWrapper);
                return;
            }

            if (!pairedFieldIds.has(fieldId)) {
                body.appendChild(createField(sectionName, key, value));
            }
        });

        article.appendChild(body);
        return article;
    }

    function renderConfig(config) {
        currentConfig = config;
        configGrid.innerHTML = "";

        const sections = getOrderedSections(config);
        const skippedSections = new Set();

        sections.forEach(([sectionName, values]) => {
            if (skippedSections.has(sectionName)) {
                return;
            }

            if (sectionName === "telegram" && config.general) {
                const stack = document.createElement("div");
                stack.className = "config-card-stack";
                stack.appendChild(createSectionCard("telegram", values, config));
                stack.appendChild(createSectionCard("general", config.general, config));
                configGrid.appendChild(stack);
                skippedSections.add("general");
                return;
            }

            configGrid.appendChild(createSectionCard(sectionName, values, config));
        });

        bottomSaveButton.disabled = sections.length === 0;
    }

    function collectConfig() {
        const nextConfig = {};

        document.querySelectorAll("[data-section][data-key]").forEach((input) => {
            const section = input.dataset.section;
            const key = input.dataset.key;
            const fieldId = `${section}.${key}`;

            if (!nextConfig[section]) {
                nextConfig[section] = {};
            }

            nextConfig[section][key] = CHECKBOX_FIELDS.has(fieldId)
                ? String(input.checked)
                : input.value;
        });

        return nextConfig;
    }

    async function apiRequest(url, options = {}) {
        const response = await fetch(url, options);
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
            throw new Error(payload.error || "Požadavek se nepodařilo dokončit.");
        }

        return payload;
    }

    async function loadHost(name) {
        const payload = await apiRequest(`/api/hosts/${name}`);
        return payload.host;
    }

    async function saveHost(name, content) {
        const payload = await apiRequest(`/api/hosts/${name}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ content })
        });
        return payload.host;
    }

    function renderHosts(hosts) {
        hostsList.innerHTML = "";

        if (hosts.length === 0) {
            hostsList.innerHTML = '<div class="status">Žádné host konfigurace nejsou dostupné.</div>';
            return;
        }

        hosts.forEach((host) => {
            const item = document.createElement("details");
            item.className = "host-item";

            const summary = document.createElement("summary");
            const hostDisplayId = host.id === "host1" ? "Host 1" : host.id === "host2" ? "Host 2" : host.id;
            summary.innerHTML = `${host.label} <span>${hostDisplayId}</span>`;

            const body = document.createElement("div");
            body.className = "host-body";

            const textarea = document.createElement("textarea");
            textarea.className = "form-control";
            textarea.value = host.content;
            textarea.dataset.host = host.id;

            const hostStatus = document.createElement("div");
            hostStatus.className = "status";
            hostStatus.textContent = "Připraveno k úpravě.";

            const actions = document.createElement("div");
            actions.className = "host-actions";

            const saveButton = document.createElement("button");
            saveButton.type = "button";
            saveButton.className = "button secondary";
            saveButton.textContent = "Uložit host";
            saveButton.addEventListener("click", async () => {
                saveButton.disabled = true;
                hostStatus.textContent = "Ukládám host konfiguraci...";
                hostStatus.className = "status";

                try {
                    const savedHost = await saveHost(host.id, textarea.value);
                    textarea.value = savedHost.content;
                    hostStatus.textContent = "Host konfigurace byla uložena.";
                    hostStatus.className = "status success";
                } catch (error) {
                    if (error.message === "Unauthorized") {
                        window.location.href = "/login";
                        return;
                    }
                    hostStatus.textContent = error.message;
                    hostStatus.className = "status error";
                } finally {
                    saveButton.disabled = false;
                }
            });

            actions.appendChild(saveButton);
            body.append(textarea, hostStatus, actions);
            item.append(summary, body);
            hostsList.appendChild(item);
        });
    }

    async function loadHosts() {
        hostsList.innerHTML = '<div class="status">Načítám hosty...</div>';

        try {
            const networksPayload = await apiRequest("/api/networks");
            const hostIds = (networksPayload.networks || []).map((network) => network.id);
            const hosts = await Promise.all(hostIds.map((hostId) => loadHost(hostId)));
            renderHosts(hosts);
        } catch (error) {
            if (error.message === "Unauthorized") {
                window.location.href = "/login";
                return;
            }
            hostsList.innerHTML = `<div class="status error">${error.message}</div>`;
        }
    }

    async function loadConfig() {
        setLoading(true);
        setStatus("Načítám konfiguraci...");

        try {
            const payload = await apiRequest("/api/config");
            timezoneOptions = Array.isArray(payload.timezone_options) ? payload.timezone_options : ["system"];
            renderConfig(payload.config || {});
            setStatus("Konfigurace byla úspěšně načtena.", "success");
        } catch (error) {
            if (error.message === "Unauthorized") {
                window.location.href = "/login";
                return;
            }
            setStatus(error.message, "error");
        } finally {
            setLoading(false);
        }
    }

    async function saveConfig() {
        const config = collectConfig();
        setLoading(true);
        setStatus("Ukládám změny do app.ini...");

        try {
            const payload = await apiRequest("/api/config", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ config })
            });

            timezoneOptions = Array.isArray(payload.timezone_options) ? payload.timezone_options : timezoneOptions;
            renderConfig(payload.config || {});
            await loadHosts();
            setStatus("Konfigurace byla uložena.", "success");
        } catch (error) {
            if (error.message === "Unauthorized") {
                window.location.href = "/login";
                return;
            }
            setStatus(error.message, "error");
        } finally {
            setLoading(false);
        }
    }

    bottomSaveButton.addEventListener("click", saveConfig);

    loadConfig();
    loadHosts();
</script>
{% endblock %}
